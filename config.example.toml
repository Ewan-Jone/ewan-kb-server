# ewan-kb-server configuration example
# Copy to ~/.config/ewankb-server/config.toml and edit

[server]
# HTTP debug server settings (only used when --transport http)
port = 3000
host = "127.0.0.1"

# Knowledge bases to serve
# Each entry has a name (used as the 'kb' parameter in queries)
# and 'dir' (absolute path to the KB directory built by ewankb)

[kbs.default]
name = "default"
dir = "/path/to/your/knowledge-base"

# Add more KBs as needed:
# [kbs.wms]
# name = "wms"
# dir = "/path/to/wms-knowledge-base"